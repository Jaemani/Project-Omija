# registry/suppliers.yaml — synthetic supplier registry (P1).
#
# Single source of truth for the supply-chain graph seed. EVERY entry here is
# SYNTHETIC (*.example domains, made-up company/prime/program names). No real
# defense company is named or targeted (CLAUDE.md guardrail).
#
# Suppliers mirror adapter/mock.py SEED_SUPPLIERS 1:1 (same ids + domains) so
# the mock corpus correlates cleanly:
#   - active-compromise cases : sup-a (supplier-a.example), sup-g (avionics-g.example)
#   - clean (no exposures)    : sup-e (logistics-e.example), sup-f (metals-f.example)
#
# criticality is numeric 1..3 (3=high, 2=medium, 1=low) per the P1 decision.
# (adapter/mock.py keeps its P0-A string labels for its own internal seed; both
#  describe the same suppliers.)

suppliers:
  - id: sup-a
    name: Alpha Precision
    domains: [supplier-a.example]
    tier: 1
    criticality: 3        # high
    supplies: prime-x

  - id: sup-b
    name: Bravo Systems
    domains: [supplier-b.example]
    tier: 1
    criticality: 3        # high
    supplies: prime-x

  - id: sup-c
    name: Charlie Components
    domains: [supplier-c.example]
    tier: 2
    criticality: 2        # medium
    supplies: prime-y

  - id: sup-d
    name: Delta Parts
    domains: [parts-d.example]
    tier: 2
    criticality: 2        # medium
    supplies: prime-y

  - id: sup-g
    name: Golf Avionics
    domains: [avionics-g.example]
    tier: 2
    criticality: 3        # high
    supplies: prime-x

  - id: sup-e
    name: Echo Logistics
    domains: [logistics-e.example]
    tier: 2
    criticality: 1        # low
    supplies: prime-y

  - id: sup-f
    name: Foxtrot Metals
    domains: [metals-f.example]
    tier: 1
    criticality: 2        # medium
    supplies: prime-x

# Primes (원청/주계약) — synthetic. Supplier --supplies--> Prime (N:M) above.
primes:
  - id: prime-x
    name: Xenon Aerospace
    runs: [prog-sentinel, prog-harbor]
  - id: prime-y
    name: Yotta Defense Systems
    runs: [prog-harbor]

# Programs (방산 프로그램, 전파 최상단) — synthetic. Prime --runs--> Program (N:M).
programs:
  - id: prog-sentinel
    name: Sentinel ISR Program
    sensitivity: high
  - id: prog-harbor
    name: Harbor Sustainment Program
    sensitivity: medium
